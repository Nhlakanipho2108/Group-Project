</html><!-- OPPORTUNITIES -->
<section id="opportunities">
    <h2>Opportunities</h2>

    <div class="grid">

        <!-- Internship Card -->
        <div class="card">
            <h3>Internships</h3>
            <p>Gain real-world experience and build your future.</p>

            <label for="internships">Choose an internship:</label>
            <select id="internships">
                <option value="">-- Select an Internship --</option>
                <option value="software">Software Development Internship</option>
                <option value="marketing">Marketing Internship</option>
                <option value="finance">Finance Internship</option>
                <option value="engineering">Engineering Internship</option>
            </select>
        </div>

        <!-- Jobs Card -->
        <div class="card">
            <h3>Jobs</h3>
            <p>Find job opportunities that match your skills.</p>

            <label for="jobs">Choose a job:</label>
            <select id="jobs">
                <option value="">-- Select a Job --</option>
                <option value="developer">Junior Web Developer</option>
                <option value="assistant">Administrative Assistant</option>
                <option value="sales">Sales Representative</option>
                <option value="designer">Graphic Designer</option>
            </select>
        </div>

        <!-- Training Card -->
        <div class="card">
            <h3>Training</h3>
            <p>Learn new skills and grow professionally.</p>

            <label for="training">Choose a training program:</label>
            <select id="training">
                <option value="">-- Select a Program --</option>
                <option value="coding">Coding Bootcamp</option>
                <option value="digital-marketing">Digital Marketing</option>
                <option value="cybersecurity">Cybersecurity Fundamentals</option>
                <option value="data-analysis">Data Analysis</option>
            </select>
        </div>

    </div>
</section>
