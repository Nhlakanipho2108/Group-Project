<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8" />

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    />

    <title>YouthConnect | Log In</title>


    <link rel="stylesheet" href="styless.css" />

</head>

<body>

    <div class="login-container">

        <div class="login-card">

            <h1>YouthConnect</h1>

            <p>
                Welcome back! Log in to continue
                exploring opportunities.
            </p>

            <form id="loginForm">

                <!-- EMAIL -->

                <div class="input-group">

                    <label for="email">
                        Email Address
                    </label>

                    <input
                        type="email"
                        id="email"
                        placeholder="Enter your email"
                        required
                    />

                </div>

                <!-- PASSWORD -->

                <div class="input-group">

                    <label for="password">
                        Password
                    </label>

                    <input
                        type="password"
                        id="password"
                        placeholder="Enter your password"
                        required
                    />

                </div>

                <!-- REMEMBER -->

                <div class="options">

                    <label class="remember-me">

                        <input type="checkbox" />

                        Remember me

                    </label>

                    <a href="#">
                        Forgot Password?
                    </a>

                </div>

                <!-- BUTTON -->

                <button type="submit">
                    Log In
                </button>

            </form>

            <!-- DIVIDER -->

            <div class="divider">
                <span>OR</span>
            </div>

            <!-- GOOGLE BUTTON -->

            <button class="google-btn">
                Continue with Google
            </button>

            <!-- EXTRA LINKS -->

            <div class="extra-links">

                <p>
                    Don't have an account?
                    <a href="/Sign up/index.html">
                        Sign Up
                    </a>
                </p>

            </div>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
