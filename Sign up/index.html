<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>YouthConnect | Create Account</title>

    <link rel="stylesheet" href="style.css" />

</head>

<body>

    <section class="signup-page">

        <!-- LEFT SIDE -->
        <div class="signup-left">

            <div class="brand">

                <h1>YouthConnect</h1>

                <p>
                    Connect with opportunities,
                    build skills, and shape your future.
                </p>

            </div>

        </div>

        <!-- RIGHT SIDE -->
        <div class="signup-right">

            <div class="signup-card">

                <h2>Create Your Account</h2>

                <p class="subtitle">
                    Join thousands of young people discovering
                    jobs, internships, and training opportunities.
                </p>

                <form id="signupForm">

                    <div class="name-row">

                        <div class="input-group">
                            <label for="firstName">
                                First Name
                            </label>

                            <input
                                type="text"
                                id="firstName"
                                placeholder="John"
                                required
                            />
                        </div>

                        <div class="input-group">
                            <label for="lastName">
                                Last Name
                            </label>

                            <input
                                type="text"
                                id="lastName"
                                placeholder="Doe"
                                required
                            />
                        </div>

                    </div>

                    <div class="input-group">

                        <label for="email">
                            Email Address
                        </label>

                        <input
                            type="email"
                            id="email"
                            placeholder="Enter your email"
                            required
                        />

                    </div>

                    <div class="input-group">

                        <label for="username">
                            Username
                        </label>

                        <input
                            type="text"
                            id="username"
                            placeholder="Choose a username"
                            required
                        />

                    </div>

                    <div class="input-group">

                        <label for="password">
                            Password
                        </label>

                        <input
                            type="password"
                            id="password"
                            placeholder="Create a password"
                            required
                        />

                    </div>

                    <div class="input-group">

                        <label for="confirmPassword">
                            Confirm Password
                        </label>

                        <input
                            type="password"
                            id="confirmPassword"
                            placeholder="Confirm your password"
                            required
                        />

                    </div>

                    <button type="submit" class="signup-btn">
                        <link href="../Login/index.html" class="btn">Create Account</link>
                    </button>

                </form>

                <button class="google-btn">
                    Continue with Google
                </button>

                <div class="extra-links">

                    <p>
                        Already have an account?
                        <a href="login.html">
                            Log In
                        </a>
                    </p>

                </div>

            </div>

        </div>

    </section>
<script src="script.js"></script>
</body>

</html>
